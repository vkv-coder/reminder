<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Reminders & To-Do</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  body { background: #f2f4f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .card { background: #fff; width: 100%; max-width: 400px; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 28px; }
  h1 { font-size: 20px; text-align: center; margin-bottom: 4px; color: #1a1a1a; }
  .sub { text-align: center; color: #777; font-size: 13px; margin-bottom: 20px; }
  label { font-size: 13px; font-weight: 600; color: #333; display: block; margin: 12px 0 5px; }
  input { width: 100%; padding: 11px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  input:focus { border-color: #4a6cf7; }
  button.primary { width: 100%; margin-top: 20px; padding: 12px; background: #4a6cf7; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button.primary:disabled { background: #aab8f7; cursor: not-allowed; }
  .link { text-align: center; margin-top: 14px; font-size: 13px; color: #4a6cf7; cursor: pointer; text-decoration: underline; }
  .msg { margin-top: 14px; padding: 10px 12px; border-radius: 8px; font-size: 13px; display: none; }
  .msg.error { background: #fdeaea; color: #b42318; display: block; }
  .msg.success { background: #e8f5e9; color: #1b7a2e; display: block; }
  .msg.info { background: #eaf1fd; color: #1a4fb4; display: block; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="card">
  <h1>Reminders & To-Do</h1>
  <div class="sub">Set a new password</div>

  <div id="resetForm">
    <label>New Password</label>
    <input type="password" id="newPassword" placeholder="At least 6 characters">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Re-enter password">
    <button class="primary" id="resetBtn" onclick="doResetPassword()">Set New Password</button>
    <div class="msg" id="resetMsg"></div>
  </div>

  <div class="hidden" id="successScreen">
    <div class="msg success">Password updated! You can now log in with your new password.</div>
    <div id="redirectNote" style="text-align:center;font-size:12px;color:#999;margin-top:10px;">Redirecting to login in <span id="redirectCount">4</span>...</div>
    <button class="primary" id="goToLoginBtn" onclick="window.location.href='auth.html'">Go to Login →</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://jqqnnkzozjskziaizajg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcW5ua3pvempza3ppYWl6YWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mjk1ODAsImV4cCI6MjA4ODUwNTU4MH0.sEYeWnm0dvuw8bLSVnQhqmgV8LB-pELjpuVIa3Us1Gg';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg ' + type;
  }

  async function doResetPassword() {
    const pw1 = document.getElementById('newPassword').value;
    const pw2 = document.getElementById('confirmPassword').value;

    if (!pw1 || pw1.length < 6) { showMsg('resetMsg', 'Password must be at least 6 characters.', 'error'); return; }
    if (pw1 !== pw2) { showMsg('resetMsg', 'Passwords do not match.', 'error'); return; }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = 'Updating...';

    try {
      // Supabase JS v2 automatically picks up the recovery session from the
      // emailed link's URL fragment before this code runs.
      const { error } = await supabaseClient.auth.updateUser({ password: pw1 });
      if (error) throw error;
      document.getElementById('resetForm').classList.add('hidden');
      document.getElementById('successScreen').classList.remove('hidden');
      let secs = 4;
      const countEl = document.getElementById('redirectCount');
      const timer = setInterval(() => {
        secs--;
        if (countEl) countEl.textContent = secs;
        if (secs <= 0) { clearInterval(timer); window.location.href = 'auth.html'; }
      }, 1000);
    } catch (err) {
      showMsg('resetMsg', err.message || 'Failed to reset password. The link may have expired — request a new one.', 'error');
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  }

  // If Supabase never establishes a session from the link (expired/invalid),
  // let the user know instead of leaving a silently-broken form.
  window.addEventListener('load', async () => {
    setTimeout(async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) {
        showMsg('resetMsg', 'This reset link is invalid or has expired. Please request a new one from the login page.', 'error');
        document.getElementById('resetBtn').disabled = true;
      }
    }, 1500);
  });
</script>
</body>
</html>
